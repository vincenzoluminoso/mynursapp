<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyNursApp Pro - Gestionale Infermieristico</title>
    
    <!-- Tailwind CSS per la grafica -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel per far funzionare l'app nel browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat (Versione a prova di bomba per file singoli) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* Stili per nascondere il menu quando stampi la ricevuta in PDF */
        @media print {
            body * { visibility: hidden; }
            #area-stampa, #area-stampa * { visibility: visible; }
            #area-stampa { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // 1. INIZIALIZZAZIONE FIREBASE CON LE TUE CHIAVI
        const firebaseConfig = {
            apiKey: "AIzaSyBfsAtSpHSmg3LuOQFdgVl0Fb9-TG7SNTs",
            authDomain: "mynursapp-definitiva.firebaseapp.com",
            projectId: "mynursapp-definitiva",
            storageBucket: "mynursapp-definitiva.firebasestorage.app",
            messagingSenderId: "480040059911",
            appId: "1:480040059911:web:106fe5873d20b3e2f256a2"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Email autorizzate ad essere Amministratori
        const ADMIN_EMAILS = ['leperemariarosaria@gmail.com', 'vincenzo.luminoso@gmail.com'];

        // --- COMPONENTE PRINCIPALE ---
        function App() {
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('dashboard');

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        // Controlla o crea profilo su Firestore
                        const docRef = db.collection('utenti').doc(currentUser.uid);
                        const docSnap = await docRef.get();
                        
                        const isAdmin = ADMIN_EMAILS.includes(currentUser.email);

                        if (docSnap.exists) {
                            let p = docSnap.data();
                            if (isAdmin && (!p.admin || !p.abilitato)) {
                                await docRef.update({ admin: true, abilitato: true });
                                p.admin = true; p.abilitato = true;
                            }
                            setProfile(p);
                        } else {
                            const newProfile = { email: currentUser.email, abilitato: isAdmin, admin: isAdmin };
                            await docRef.set(newProfile);
                            setProfile(newProfile);
                        }
                    } else {
                        setUser(null);
                        setProfile(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-xl font-bold text-indigo-600">Caricamento MyNursApp...</div>;
            
            if (!user) return <LoginScreen />;

            if (!profile?.abilitato) return (
                <div className="h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm">
                        <h2 className="text-2xl font-bold text-amber-600 mb-2">Account in Attesa</h2>
                        <p className="text-gray-600 mb-6">Il tuo account deve essere sbloccato dall'amministratore. Attendi l'attivazione.</p>
                        <button onClick={() => auth.signOut()} className="text-indigo-600 font-bold underline">Esci</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Menu Laterale */}
                    <aside className="w-64 bg-indigo-900 text-white flex flex-col no-print">
                        <div className="p-6">
                            <h1 className="text-2xl font-black flex items-center gap-2">⚕️ MyNursApp</h1>
                            <p className="text-indigo-300 text-xs mt-1 truncate">{user.email}</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setView('dashboard')} className={`w-full text-left px-4 py-3 rounded-xl font-medium ${view==='dashboard'?'bg-indigo-700':'hover:bg-indigo-800'}`}>📊 Dashboard</button>
                            <button onClick={() => setView('pazienti')} className={`w-full text-left px-4 py-3 rounded-xl font-medium ${view==='pazienti'?'bg-indigo-700':'hover:bg-indigo-800'}`}>🤝 I Miei Pazienti</button>
                            <button onClick={() => setView('calcolatore')} className={`w-full text-left px-4 py-3 rounded-xl font-medium ${view==='calcolatore'?'bg-indigo-700':'hover:bg-indigo-800'}`}>🧮 Calcolatore Fatture</button>
                            {profile.admin && <button onClick={() => setView('admin')} className={`w-full text-left px-4 py-3 rounded-xl font-medium text-amber-300 ${view==='admin'?'bg-indigo-700':'hover:bg-indigo-800'}`}>👑 Pannello Admin</button>}
                        </nav>
                        <div className="p-4 border-t border-indigo-800">
                            <button onClick={() => auth.signOut()} className="w-full text-left px-4 py-2 text-red-400 hover:bg-indigo-800 rounded-lg transition font-medium">🚪 Esci</button>
                        </div>
                    </aside>

                    {/* Contenuto Principale */}
                    <main className="flex-1 overflow-y-auto p-8 relative bg-slate-100">
                        {view === 'dashboard' && <Dashboard setView={setView} />}
                        {view === 'pazienti' && <Pazienti userId={user.uid} />}
                        {view === 'calcolatore' && <Calcolatore userId={user.uid} />}
                        {view === 'admin' && profile.admin && <AdminPanel />}
                    </main>
                </div>
            );
        }

        // --- LOGIN E REGISTRAZIONE ---
        function LoginScreen() {
            const [isLogin, setIsLogin] = React.useState(true);
            const [email, setEmail] = React.useState('');
            const [pass, setPass] = React.useState('');
            const [err, setErr] = React.useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                setErr('');
                try {
                    if (isLogin) await auth.signInWithEmailAndPassword(email, pass);
                    else await auth.createUserWithEmailAndPassword(email, pass);
                } catch (error) {
                    setErr("Errore: " + error.message);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-indigo-50 p-4">
                    <form onSubmit={handleAuth} className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
                        <div className="text-center mb-8">
                            <span className="text-5xl mb-4 block">⚕️</span>
                            <h1 className="text-3xl font-black text-indigo-900 mb-1">MyNursApp</h1>
                            <p className="text-slate-500 font-medium">{isLogin ? "Accedi" : "Registrati"}</p>
                        </div>
                        {err && <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm">{err}</div>}
                        <input type="email" placeholder="Email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full mb-4 px-4 py-3 rounded-xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500" />
                        <input type="password" placeholder="Password" required value={pass} onChange={e=>setPass(e.target.value)} className="w-full mb-6 px-4 py-3 rounded-xl border bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500" />
                        <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">{isLogin ? "ACCEDI" : "CREA ACCOUNT"}</button>
                        <button type="button" onClick={() => {setIsLogin(!isLogin); setErr('');}} className="w-full mt-6 text-indigo-600 text-sm hover:underline">
                            {isLogin ? "Nuovo utente? Registrati" : "Hai già un account? Accedi"}
                        </button>
                    </form>
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ setView }) {
            return (
                <div className="max-w-4xl mx-auto">
                    <h2 className="text-3xl font-black text-slate-800 mb-2">Benvenuta! 👋</h2>
                    <p className="text-slate-500 mb-8">Riepilogo della tua attività infermieristica in libera professione.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div onClick={() => setView('pazienti')} className="bg-white p-6 rounded-3xl shadow-sm border cursor-pointer hover:shadow-md transition">
                            <div className="text-4xl mb-4">🤝</div>
                            <h3 className="text-xl font-bold">I Tuoi Pazienti</h3>
                            <p className="text-sm text-slate-500">Gestisci le cartelle cliniche e lo storico fatture.</p>
                        </div>
                        <div onClick={() => setView('calcolatore')} className="bg-white p-6 rounded-3xl shadow-sm border cursor-pointer hover:shadow-md transition">
                            <div className="text-4xl mb-4">🧮</div>
                            <h3 className="text-xl font-bold">Fatturazione</h3>
                            <p className="text-sm text-slate-500">Calcola netti, lordi, ENPAPI e crea ricevute PDF.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- GESTIONE PAZIENTI E CARTELLE CLINICHE ---
        function Pazienti({ userId }) {
            const [pazienti, setPazienti] = React.useState([]);
            const [nome, setNome] = React.useState('');
            const [cf, setCf] = React.useState('');
            const [pazienteAttivo, setPazienteAttivo] = React.useState(null);

            React.useEffect(() => {
                const unsubscribe = db.collection('pazienti')
                    .where('infermiereId', '==', userId)
                    .onSnapshot(snap => {
                        const lista = [];
                        snap.forEach(doc => lista.push({ id: doc.id, ...doc.data() }));
                        setPazienti(lista);
                    });
                return () => unsubscribe();
            }, [userId]);

            const aggiungiPaziente = async (e) => {
                e.preventDefault();
                await db.collection('pazienti').add({ nome, cf: cf.toUpperCase(), infermiereId: userId, data: new Date().toISOString() });
                setNome(''); setCf('');
            };

            if (pazienteAttivo) return <CartellaPaziente paziente={pazienteAttivo} tornaIndietro={() => setPazienteAttivo(null)} userId={userId} />;

            return (
                <div className="max-w-4xl mx-auto">
                    <h2 className="text-3xl font-black mb-6">Archivio Pazienti</h2>
                    <form onSubmit={aggiungiPaziente} className="bg-white p-6 rounded-3xl shadow-sm border mb-8 flex gap-4">
                        <input required value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome e Cognome Paziente" className="flex-1 px-4 py-2 border rounded-xl" />
                        <input value={cf} onChange={e=>setCf(e.target.value)} placeholder="Codice Fiscale (opzionale)" className="flex-1 px-4 py-2 border rounded-xl uppercase" />
                        <button type="submit" className="bg-indigo-600 text-white font-bold px-6 py-2 rounded-xl hover:bg-indigo-700">Aggiungi</button>
                    </form>
                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        {pazienti.length === 0 ? <p className="p-8 text-center text-slate-500">Nessun paziente. Aggiungi il primo!</p> : 
                            <ul className="divide-y">
                                {pazienti.map(p => (
                                    <li key={p.id} onClick={() => setPazienteAttivo(p)} className="p-4 hover:bg-slate-50 flex justify-between items-center cursor-pointer">
                                        <div><p className="font-bold">{p.nome}</p><p className="text-xs text-slate-500">{p.cf}</p></div>
                                        <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg text-sm font-bold">Apri Cartella ➔</span>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        function CartellaPaziente({ paziente, tornaIndietro, userId }) {
            const [prestazioni, setPrestazioni] = React.useState([]);
            const [descrizione, setDescrizione] = React.useState('');
            const [importo, setImporto] = React.useState('');

            React.useEffect(() => {
                const unsubscribe = db.collection('prestazioni')
                    .where('pazienteId', '==', paziente.id)
                    .orderBy('data', 'desc')
                    .onSnapshot(snap => {
                        const lista = [];
                        snap.forEach(doc => lista.push({ id: doc.id, ...doc.data() }));
                        setPrestazioni(lista);
                    });
                return () => unsubscribe();
            }, [paziente.id]);

            const aggiungiPrestazione = async (e) => {
                e.preventDefault();
                await db.collection('prestazioni').add({
                    pazienteId: paziente.id, infermiereId: userId, descrizione, importo: Number(importo), data: new Date().toISOString()
                });
                setDescrizione(''); setImporto('');
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <button onClick={tornaIndietro} className="mb-4 text-indigo-600 font-bold">⬅ Torna ai pazienti</button>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border mb-8">
                        <h2 className="text-2xl font-black">Cartella: {paziente.nome}</h2>
                        <p className="text-sm text-slate-500">CF: {paziente.cf || 'Non inserito'}</p>
                    </div>

                    <h3 className="font-bold mb-4 text-lg">Aggiungi Prestazione in Cartella</h3>
                    <form onSubmit={aggiungiPrestazione} className="bg-white p-4 rounded-2xl shadow-sm border mb-8 flex gap-4">
                        <input required value={descrizione} onChange={e=>setDescrizione(e.target.value)} placeholder="Es: Medicazione complessa" className="flex-1 px-4 py-2 border rounded-xl" />
                        <input required type="number" value={importo} onChange={e=>setImporto(e.target.value)} placeholder="€ Importo" className="w-32 px-4 py-2 border rounded-xl" />
                        <button type="submit" className="bg-emerald-500 text-white font-bold px-4 rounded-xl">Salva</button>
                    </form>

                    <h3 className="font-bold mb-4 text-lg">Storico Prestazioni</h3>
                    <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        {prestazioni.length === 0 ? <p className="p-6 text-center text-slate-500">Nessuna prestazione in archivio.</p> :
                            <ul className="divide-y">
                                {prestazioni.map(p => (
                                    <li key={p.id} className="p-4 flex justify-between">
                                        <div><p className="font-bold">{p.descrizione}</p><p className="text-xs text-slate-400">{new Date(p.data).toLocaleDateString()}</p></div>
                                        <p className="font-bold text-emerald-600">€ {p.importo.toFixed(2)}</p>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        // --- CALCOLATORE E STAMPA PDF ---
        function Calcolatore({ userId }) {
            const [paziente, setPaziente] = React.useState('Signor Rossi');
            const [prestazione, setPrestazione] = React.useState('Prestazione Infermieristica');
            const [compenso, setCompenso] = React.useState(30);
            const [km, setKm] = React.useState(0);
            const [costoKm, setCostoKm] = React.useState(0.40);
            const [tasse, setTasse] = React.useState(5);

            // LOGICA MATEMATICA E FISCALE
            const rimborsoKm = km * costoKm;
            const enpapi = compenso * 0.04;
            const totaleLordoFattura = compenso + rimborsoKm + enpapi; // Il paziente paga questo
            
            // Calcolo Tasse: 78% del totale lordo è la base imponibile
            const baseImponibile = totaleLordoFattura * 0.78;
            const importoTasse = baseImponibile * (tasse / 100);
            
            // Il netto reale (togliamo tasse e la cassa previdenziale)
            const nettoInTasca = totaleLordoFattura - importoTasse - enpapi;

            return (
                <div className="max-w-5xl mx-auto flex flex-col lg:flex-row gap-8">
                    {/* PANNELLO INPUT (Nascondi in stampa) */}
                    <div className="flex-1 bg-white p-6 rounded-3xl shadow-sm border no-print">
                        <h2 className="text-2xl font-black mb-6">🧮 Calcolatore Fattura</h2>
                        
                        <div className="space-y-4 mb-6">
                            <div><label className="text-sm font-bold text-slate-500">Paziente</label><input value={paziente} onChange={e=>setPaziente(e.target.value)} className="w-full px-4 py-2 border rounded-xl" /></div>
                            <div><label className="text-sm font-bold text-slate-500">Prestazione (es. Listino)</label><input value={prestazione} onChange={e=>setPrestazione(e.target.value)} className="w-full px-4 py-2 border rounded-xl" /></div>
                            <div className="flex gap-4">
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Compenso Base (€)</label><input type="number" value={compenso} onChange={e=>setCompenso(Number(e.target.value))} className="w-full px-4 py-2 border rounded-xl font-bold text-lg" /></div>
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Km Percorsi</label><input type="number" value={km} onChange={e=>setKm(Number(e.target.value))} className="w-full px-4 py-2 border rounded-xl text-lg" /></div>
                            </div>
                        </div>

                        <div className="p-4 bg-slate-50 rounded-xl mb-6">
                            <label className="font-bold block mb-2">Regime Forfettario</label>
                            <div className="flex gap-4">
                                <label><input type="radio" checked={tasse===5} onChange={()=>setTasse(5)}/> 5% (Nuova att.)</label>
                                <label><input type="radio" checked={tasse===15} onChange={()=>setTasse(15)}/> 15% (Standard)</label>
                            </div>
                        </div>

                        <div className="bg-indigo-900 text-white p-4 rounded-2xl">
                            <div className="flex justify-between mb-2"><span>Lordo da chiedere (Tot. Fattura):</span><span className="font-bold text-xl text-emerald-400">€ {totaleLordoFattura.toFixed(2)}</span></div>
                            <div className="flex justify-between"><span>Tuo Netto Reale (Sottratte Tasse/Enpapi):</span><span className="font-bold text-xl">€ {nettoInTasca.toFixed(2)}</span></div>
                            <p className="text-xs text-indigo-300 mt-2">*Calcolo basato su coefficiente 78% (Infermiere)</p>
                        </div>

                        <button onClick={() => window.print()} className="w-full mt-6 bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600">🖨️ Stampa PDF Ricevuta</button>
                    </div>

                    {/* AREA STAMPA (La vera fattura) */}
                    <div id="area-stampa" className="w-full lg:w-[400px] bg-white p-8 rounded-3xl border shadow-sm">
                        <div className="border-b-2 border-slate-800 pb-4 mb-6">
                            <h1 className="text-2xl font-black">RICEVUTA SANITARIA</h1>
                            <p className="text-sm text-slate-500">Professione Infermieristica</p>
                        </div>
                        
                        <div className="mb-6">
                            <p className="text-sm font-bold text-slate-500">Cliente/Paziente</p>
                            <p className="text-lg font-bold">{paziente}</p>
                            <p className="text-sm">Data: {new Date().toLocaleDateString()}</p>
                        </div>

                        <table className="w-full mb-8 text-sm">
                            <thead><tr className="border-b text-left"><th className="pb-2">Descrizione</th><th className="pb-2 text-right">Importo</th></tr></thead>
                            <tbody>
                                <tr><td className="py-2">{prestazione}</td><td className="py-2 text-right">€ {compenso.toFixed(2)}</td></tr>
                                {km > 0 && <tr><td className="py-2">Rimborso Km ({km})</td><td className="py-2 text-right">€ {rimborsoKm.toFixed(2)}</td></tr>}
                                <tr><td className="py-2">Maggiorazione ENPAPI (4%)</td><td className="py-2 text-right">€ {enpapi.toFixed(2)}</td></tr>
                            </tbody>
                        </table>

                        <div className="border-t-2 border-slate-800 pt-4 flex justify-between items-center mb-8">
                            <span className="font-bold">TOTALE DA PAGARE</span>
                            <span className="text-2xl font-black">€ {totaleLordoFattura.toFixed(2)}</span>
                        </div>

                        <div className="text-[10px] text-slate-500 text-justify">
                            Operazione in franchigia da IVA ai sensi dell'art. 1, commi da 54 a 89 della Legge n. 190/2014 - Regime Forfettario. Il compenso non è soggetto a ritenuta d'acconto.
                        </div>
                    </div>
                </div>
            );
        }

        // --- PANNELLO ADMIN ---
        function AdminPanel() {
            const [utenti, setUtenti] = React.useState([]);

            React.useEffect(() => {
                const load = async () => {
                    const snap = await db.collection('utenti').get();
                    const lista = [];
                    snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
                    setUtenti(lista);
                };
                load();
            }, []);

            const toggleAbilita = async (id, stato) => {
                await db.collection('utenti').doc(id).update({ abilitato: !stato });
                setUtenti(utenti.map(u => u.id === id ? {...u, abilitato: !stato} : u));
            };

            return (
                <div className="max-w-4xl mx-auto no-print">
                    <h2 className="text-3xl font-black mb-6">Pannello Controllo Accessi 👑</h2>
                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <ul className="divide-y">
                            {utenti.map(u => (
                                <li key={u.id} className="p-4 flex justify-between items-center">
                                    <span className="font-bold">{u.email}</span>
                                    <button onClick={() => toggleAbilita(u.id, u.abilitato)} className={`px-4 py-2 rounded-xl font-bold text-sm ${u.abilitato ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                        {u.abilitato ? "Blocca Accesso" : "Sblocca"}
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        // --- AVVIO APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
