<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyNursApp Pro - Gestionale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @media print {
            body * { visibility: hidden; }
            #area-stampa, #area-stampa * { visibility: visible; }
            #area-stampa { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
            .no-print { display: none !important; }
        }
        /* Scrollbar personalizzata per menu laterale */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // --- CHIAVI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfsAtSpHSmg3LuOQFdgVl0Fb9-TG7SNTs",
            authDomain: "mynursapp-definitiva.firebaseapp.com",
            projectId: "mynursapp-definitiva",
            storageBucket: "mynursapp-definitiva.firebasestorage.app",
            messagingSenderId: "480040059911",
            appId: "1:480040059911:web:106fe5873d20b3e2f256a2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAILS = ['vincenzo.luminoso@gmail.com'];

        // --- COMPONENTE PRINCIPALE ---
        function App() {
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('dashboard');
            const [userSettings, setUserSettings] = React.useState({ costoKm: 0.40 });

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        const docRef = db.collection('utenti').doc(currentUser.uid);
                        const docSnap = await docRef.get();
                        const isAdmin = ADMIN_EMAILS.includes(currentUser.email);

                        if (docSnap.exists) {
                            let p = docSnap.data();
                            if (isAdmin && (!p.admin || !p.abilitato)) {
                                await docRef.update({ admin: true, abilitato: true });
                                p.admin = true; p.abilitato = true;
                            }
                            setProfile(p);
                            if(p.costoKm) setUserSettings({ costoKm: p.costoKm });
                        } else {
                            const newProfile = { email: currentUser.email, abilitato: isAdmin, admin: isAdmin, costoKm: 0.40 };
                            await docRef.set(newProfile);
                            setProfile(newProfile);
                        }
                    } else {
                        setUser(null); setProfile(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const updateSettings = async (newCostoKm) => {
                await db.collection('utenti').doc(user.uid).update({ costoKm: newCostoKm });
                setUserSettings({ costoKm: newCostoKm });
                alert("Costo Km aggiornato!");
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-xl font-bold text-indigo-600">Caricamento MyNursApp...</div>;
            if (!user) return <LoginScreen />;
            if (!profile?.abilitato) return <InAttesa auth={auth} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 bg-indigo-900 text-white flex flex-col no-print h-full">
                        <div className="p-6">
                            <h1 className="text-2xl font-black text-emerald-400">⚕️ MyNursApp</h1>
                            <p className="text-indigo-300 text-xs mt-1 truncate">{user.email}</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-1 overflow-y-auto">
                            <MenuBtn v='dashboard' curr={view} set={setView} icon="📊" text="Dashboard" />
                            <MenuBtn v='pazienti' curr={view} set={setView} icon="🤝" text="Pazienti & Cartelle" />
                            <MenuBtn v='listino' curr={view} set={setView} icon="📋" text="Il Mio Listino" />
                            <MenuBtn v='calcolatore' curr={view} set={setView} icon="🧮" text="Fatturazione PDF" />
                            <MenuBtn v='spese' curr={view} set={setView} icon="📉" text="Gestione Spese" />
                            <MenuBtn v='ai' curr={view} set={setView} icon="🤖" text="Assistente AI Salute" />
                            {profile.admin && <MenuBtn v='admin' curr={view} set={setView} icon="👑" text="Pannello Admin" color="text-amber-300" />}
                            
                            <div className="mt-8 pt-4 border-t border-indigo-800">
                                <label className="text-xs text-indigo-300 mb-1 block">Il tuo Rimborso al Km (€)</label>
                                <input type="number" step="0.1" value={userSettings.costoKm} onChange={(e) => updateSettings(Number(e.target.value))} className="w-full bg-indigo-800 text-white px-3 py-1 rounded text-sm outline-none" />
                            </div>
                        </nav>
                        <div className="p-4 bg-indigo-950">
                            <button onClick={() => auth.signOut()} className="w-full text-left px-4 py-2 text-red-400 hover:bg-indigo-800 rounded-lg transition font-bold">🚪 Esci</button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-8 bg-slate-100 relative">
                        {view === 'dashboard' && <Dashboard setView={setView} />}
                        {view === 'pazienti' && <Pazienti userId={user.uid} />}
                        {view === 'listino' && <Listino userId={user.uid} />}
                        {view === 'calcolatore' && <Calcolatore userId={user.uid} costoKmBase={userSettings.costoKm} />}
                        {view === 'spese' && <Spese userId={user.uid} />}
                        {view === 'ai' && <AssistenteAI />}
                        {view === 'admin' && profile.admin && <AdminPanel />}
                    </main>
                </div>
            );
        }

        // Utility Menu Button
        function MenuBtn({v, curr, set, icon, text, color="text-white"}) {
            return (
                <button onClick={() => set(v)} className={`w-full flex items-center gap-3 text-left px-4 py-3 rounded-xl font-medium ${color} ${curr===v ? 'bg-indigo-700 shadow-inner' : 'hover:bg-indigo-800 transition'}`}>
                    <span className="text-lg">{icon}</span> <span className="text-sm">{text}</span>
                </button>
            );
        }

        // --- IL MIO LISTINO PRESTAZIONI ---
        function Listino({ userId }) {
            const [servizi, setServizi] = React.useState([]);
            const [nome, setNome] = React.useState('');
            const [prezzo, setPrezzo] = React.useState('');

            React.useEffect(() => {
                return db.collection('listino').where('userId', '==', userId).onSnapshot(snap => {
                    const l = []; snap.forEach(d => l.push({id: d.id, ...d.data()})); setServizi(l);
                });
            }, [userId]);

            const aggiungi = async (e) => {
                e.preventDefault();
                await db.collection('listino').add({ userId, nome, prezzo: Number(prezzo) });
                setNome(''); setPrezzo('');
            };

            const elimina = async (id) => await db.collection('listino').doc(id).delete();

            return (
                <div className="max-w-4xl mx-auto">
                    <h2 className="text-3xl font-black mb-2">📋 Listino Prestazioni</h2>
                    <p className="text-slate-500 mb-8">Salva qui i tuoi servizi. Li ritroverai nel calcolatore fatture pronti all'uso.</p>
                    
                    <form onSubmit={aggiungi} className="bg-white p-6 rounded-3xl shadow-sm border mb-8 flex gap-4">
                        <input required value={nome} onChange={e=>setNome(e.target.value)} placeholder="Es: Medicazione Complessa" className="flex-1 px-4 py-2 border rounded-xl" />
                        <input required type="number" value={prezzo} onChange={e=>setPrezzo(e.target.value)} placeholder="Prezzo €" className="w-32 px-4 py-2 border rounded-xl" />
                        <button type="submit" className="bg-indigo-600 text-white font-bold px-6 py-2 rounded-xl">Aggiungi</button>
                    </form>

                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        {servizi.length === 0 ? <p className="p-8 text-center text-slate-500">Listino vuoto. Aggiungi il tuo primo servizio.</p> :
                            <ul className="divide-y">
                                {servizi.map(s => (
                                    <li key={s.id} className="p-4 flex justify-between items-center">
                                        <span className="font-bold text-lg">{s.nome}</span>
                                        <div className="flex items-center gap-4">
                                            <span className="font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg">€ {s.prezzo.toFixed(2)}</span>
                                            <button onClick={()=>elimina(s.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-lg">🗑️</button>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        // --- GESTIONE SPESE (Commercialista, Materiali, ecc) ---
        function Spese({ userId }) {
            const [spese, setSpese] = React.useState([]);
            const [desc, setDesc] = React.useState('');
            const [importo, setImporto] = React.useState('');

            React.useEffect(() => {
                return db.collection('spese').where('userId', '==', userId).orderBy('data', 'desc').onSnapshot(snap => {
                    const l = []; snap.forEach(d => l.push({id: d.id, ...d.data()})); setSpese(l);
                });
            }, [userId]);

            const aggiungi = async (e) => {
                e.preventDefault();
                await db.collection('spese').add({ userId, desc, importo: Number(importo), data: new Date().toISOString() });
                setDesc(''); setImporto('');
            };

            const totaleSpese = spese.reduce((acc, s) => acc + s.importo, 0);

            return (
                <div className="max-w-4xl mx-auto">
                    <h2 className="text-3xl font-black mb-2">📉 Spese Professionali</h2>
                    <p className="text-slate-500 mb-8">Traccia uscite per materiali, commercialista, carburante non rimborsato, ecc.</p>
                    
                    <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-8 border border-red-100 flex justify-between items-center">
                        <span className="font-bold">Totale Spese Registrate:</span>
                        <span className="text-2xl font-black">€ {totaleSpese.toFixed(2)}</span>
                    </div>

                    <form onSubmit={aggiungi} className="bg-white p-6 rounded-3xl shadow-sm border mb-8 flex gap-4">
                        <input required value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Es: Fattura Commercialista / Guanti" className="flex-1 px-4 py-2 border rounded-xl" />
                        <input required type="number" value={importo} onChange={e=>setImporto(e.target.value)} placeholder="Importo €" className="w-32 px-4 py-2 border rounded-xl" />
                        <button type="submit" className="bg-red-500 text-white font-bold px-6 py-2 rounded-xl">Registra Spesa</button>
                    </form>

                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <ul className="divide-y">
                            {spese.map(s => (
                                <li key={s.id} className="p-4 flex justify-between items-center">
                                    <div><p className="font-bold">{s.desc}</p><p className="text-xs text-slate-400">{new Date(s.data).toLocaleDateString()}</p></div>
                                    <span className="font-bold text-red-600">- € {s.importo.toFixed(2)}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        // --- CALCOLATORE AVANZATO CON BOLLO E LISTINO ---
        function Calcolatore({ userId, costoKmBase }) {
            const [listino, setListino] = React.useState([]);
            
            // Stato input
            const [paziente, setPaziente] = React.useState('');
            const [prestazione, setPrestazione] = React.useState('');
            const [compenso, setCompenso] = React.useState(0);
            const [km, setKm] = React.useState(0);
            const [tasse, setTasse] = React.useState(5);
            const [applicaBollo, setApplicaBollo] = React.useState(false);

            React.useEffect(() => {
                db.collection('listino').where('userId', '==', userId).get().then(snap => {
                    const l = []; snap.forEach(d => l.push(d.data())); setListino(l);
                });
            }, [userId]);

            // Auto-compilazione dal listino
            const handleSelectServizio = (e) => {
                const sel = listino.find(s => s.nome === e.target.value);
                if (sel) { setPrestazione(sel.nome); setCompenso(sel.prezzo); }
            };

            // LOGICA MATEMATICA
            const rimborsoKm = km * costoKmBase;
            const enpapi = compenso * 0.04;
            const imponibileFattura = compenso + rimborsoKm + enpapi; 
            
            // Marca da Bollo (Legge italiana: > 77,47€)
            React.useEffect(() => {
                if (imponibileFattura > 77.47) setApplicaBollo(true);
                else setApplicaBollo(false);
            }, [imponibileFattura]);

            const bollo = applicaBollo ? 2.00 : 0;
            const totaleDaPagare = imponibileFattura + bollo;
            
            const imponibileTasse = imponibileFattura * 0.78; // 78% infermieri
            const importoTasse = imponibileTasse * (tasse / 100);
            const netto = imponibileFattura - importoTasse - enpapi; // Bollo non fa reddito, è neutro

            return (
                <div className="max-w-5xl mx-auto flex flex-col xl:flex-row gap-8">
                    <div className="flex-1 bg-white p-6 rounded-3xl shadow-sm border no-print">
                        <h2 className="text-2xl font-black mb-6">🧮 Creazione Fattura</h2>
                        <div className="space-y-4 mb-6">
                            <div><label className="text-sm font-bold text-slate-500">Paziente</label><input value={paziente} onChange={e=>setPaziente(e.target.value)} placeholder="Nome Cognome" className="w-full px-4 py-2 border rounded-xl bg-slate-50" /></div>
                            
                            {/* MENU A TENDINA LISTINO */}
                            {listino.length > 0 && (
                                <div>
                                    <label className="text-sm font-bold text-emerald-600">Scegli dal Listino Rapido</label>
                                    <select onChange={handleSelectServizio} className="w-full px-4 py-2 border rounded-xl border-emerald-300 bg-emerald-50 cursor-pointer text-emerald-900 font-bold">
                                        <option value="">-- Seleziona una prestazione salvata --</option>
                                        {listino.map((s, i) => <option key={i} value={s.nome}>{s.nome} (€{s.prezzo})</option>)}
                                    </select>
                                </div>
                            )}

                            <div><label className="text-sm font-bold text-slate-500">Descrizione Prestazione (Manuale)</label><input value={prestazione} onChange={e=>setPrestazione(e.target.value)} className="w-full px-4 py-2 border rounded-xl" /></div>
                            
                            <div className="flex gap-4">
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Compenso (€)</label><input type="number" value={compenso} onChange={e=>setCompenso(Number(e.target.value))} className="w-full px-4 py-2 border rounded-xl text-lg font-bold" /></div>
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Km percorsi</label><input type="number" value={km} onChange={e=>setKm(Number(e.target.value))} placeholder={`0 (a €${costoKmBase}/km)`} className="w-full px-4 py-2 border rounded-xl text-lg" /></div>
                            </div>
                            
                            <div className="p-4 bg-slate-50 rounded-xl flex justify-between items-center">
                                <div>
                                    <label className="font-bold block text-sm">Tasse (Forfettario)</label>
                                    <label className="mr-4 text-sm"><input type="radio" checked={tasse===5} onChange={()=>setTasse(5)}/> 5%</label>
                                    <label className="text-sm"><input type="radio" checked={tasse===15} onChange={()=>setTasse(15)}/> 15%</label>
                                </div>
                                <div className="text-right">
                                    <label className="font-bold block text-sm text-red-600">Imposta di Bollo 2€</label>
                                    <label className="text-sm"><input type="checkbox" checked={applicaBollo} onChange={(e)=>setApplicaBollo(e.target.checked)}/> Aggiungi se &gt; 77,47€</label>
                                </div>
                            </div>
                        </div>

                        <div className="bg-indigo-900 text-white p-4 rounded-2xl shadow-inner">
                            <div className="flex justify-between mb-2"><span>Da farsi pagare dal paziente (Lordo):</span><span className="font-black text-xl text-emerald-400">€ {totaleDaPagare.toFixed(2)}</span></div>
                            <div className="flex justify-between text-indigo-200"><span>Tuo Guadagno Netto in tasca:</span><span className="font-bold text-white">€ {netto.toFixed(2)}</span></div>
                        </div>
                        <button onClick={() => window.print()} className="w-full mt-6 bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-wide">🖨️ Stampa PDF</button>
                    </div>

                    {/* FATTURA STAMPABILE */}
                    <div id="area-stampa" className="w-full xl:w-[400px] bg-white p-8 rounded-3xl border shadow-sm text-slate-800 relative">
                        <div className="border-b-2 border-slate-800 pb-4 mb-6">
                            <h1 className="text-2xl font-black">FATTURA / RICEVUTA</h1>
                            <p className="text-xs text-slate-500">Professionista Sanitario Infermiere</p>
                        </div>
                        <div className="mb-6"><p className="font-bold">Spett.le: {paziente || '_____________________'}</p><p className="text-sm">Data: {new Date().toLocaleDateString()}</p></div>
                        
                        <table className="w-full mb-8 text-sm">
                            <thead><tr className="border-b-2 border-slate-200 text-left"><th className="pb-2">Descrizione</th><th className="pb-2 text-right">Importo</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                                <tr><td className="py-3">{prestazione || 'Prestazione'}</td><td className="py-3 text-right">€ {compenso.toFixed(2)}</td></tr>
                                {km > 0 && <tr><td className="py-3">Rimborso Spese Km ({km} km)</td><td className="py-3 text-right">€ {rimborsoKm.toFixed(2)}</td></tr>}
                                <tr><td className="py-3">Rivalsa Cassa Prev. ENPAPI (4%)</td><td className="py-3 text-right">€ {enpapi.toFixed(2)}</td></tr>
                                {applicaBollo && <tr><td className="py-3 font-bold">Imposta di Bollo (assolta sull'originale)</td><td className="py-3 text-right font-bold">€ 2.00</td></tr>}
                            </tbody>
                        </table>
                        
                        <div className="border-t-2 border-slate-800 pt-4 flex justify-between font-black text-xl mb-12">
                            <span>TOTALE DA PAGARE:</span><span>€ {totaleDaPagare.toFixed(2)}</span>
                        </div>
                        <div className="text-[10px] text-justify text-slate-500 leading-tight">
                            Operazione in franchigia da IVA ai sensi dell'art. 1, commi da 54 a 89 della L. n. 190/2014 - Regime Forfettario.<br/>
                            Compenso non soggetto a ritenuta d'acconto ai sensi della L. 190/2014 art.1 comma 67.
                        </div>
                    </div>
                </div>
            );
        }

        // --- ASSISTENTE AI (SIMULAZIONE INTERFACCIA) ---
        function AssistenteAI() {
            return (
                <div className="max-w-4xl mx-auto h-[80vh] flex flex-col bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div className="bg-indigo-900 text-white p-4 flex items-center gap-3">
                        <span className="text-3xl">🤖</span>
                        <div><h2 className="font-bold text-lg">MyNurs AI - Salute</h2><p className="text-xs text-indigo-300">Basato su Google Gemini (Interfaccia)</p></div>
                    </div>
                    <div className="flex-1 p-6 overflow-y-auto bg-slate-50 flex flex-col gap-4">
                        <div className="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none self-start max-w-[80%]">
                            <p className="font-bold mb-1">Ciao! Sono il tuo assistente virtuale clinico.</p>
                            <p className="text-sm">In una futura versione, inserendo qui una chiave API, potrai inviarmi foto di ferite o chiedermi dosaggi e procedure infermieristiche. Sarò il tuo collega sempre a disposizione!</p>
                        </div>
                    </div>
                    <div className="p-4 bg-white border-t flex gap-2">
                        <input disabled placeholder="Scrivi una domanda clinica... (Disponibile a breve)" className="flex-1 px-4 py-3 bg-slate-100 rounded-xl outline-none" />
                        <button disabled className="bg-indigo-600 text-white px-6 rounded-xl font-bold opacity-50">Invia</button>
                    </div>
                </div>
            );
        }

        // --- DASHBOARD, PAZIENTI, ADMIN, LOGIN (Semplificati per spazio) ---
        function Dashboard({setView}) { return (<div className="max-w-4xl mx-auto"><h2 className="text-3xl font-black mb-6">Benvenuta! 👋</h2><div className="grid grid-cols-2 gap-6"><div onClick={()=>setView('listino')} className="bg-white p-6 rounded-3xl border cursor-pointer hover:shadow-md"><div className="text-4xl mb-4">📋</div><h3 className="font-bold">Il Mio Listino</h3></div><div onClick={()=>setView('calcolatore')} className="bg-white p-6 rounded-3xl border cursor-pointer hover:shadow-md"><div className="text-4xl mb-4">🧮</div><h3 className="font-bold">Fatturazione</h3></div></div></div>); }
        function Pazienti({userId}) { return <div className="text-center p-8"><h2 className="text-3xl font-black mb-4">Cartelle Cliniche</h2><p className="text-slate-500">I tuoi pazienti sono al sicuro nel database.</p></div>; }
        function AdminPanel() { return <div className="text-center p-8"><h2 className="text-3xl font-black mb-4">👑 Pannello Admin</h2><p>Controlla gli accessi.</p></div>; }
        function InAttesa({auth}) { return <div className="h-screen flex items-center justify-center"><div className="bg-white p-8 rounded-xl shadow-lg text-center"><h2 className="text-2xl font-bold text-amber-600">In Attesa</h2><button onClick={()=>auth.signOut()} className="underline mt-4 text-indigo-600">Esci</button></div></div>; }
        function LoginScreen() { 
            const [e,setE]=React.useState(''), [p,setP]=React.useState(''), [i,setI]=React.useState(true);
            const sub = async(ev) => { ev.preventDefault(); try{ i?await auth.signInWithEmailAndPassword(e,p):await auth.createUserWithEmailAndPassword(e,p); }catch(err){alert(err.message)} };
            return <div className="h-screen flex items-center justify-center bg-indigo-50"><form onSubmit={sub} className="bg-white p-8 rounded-3xl shadow-xl w-96"><h1 className="text-3xl font-black text-center mb-6">MyNursApp</h1><input type="email" placeholder="Email" required onChange={x=>setE(x.target.value)} className="w-full mb-4 p-3 border rounded-xl"/><input type="password" placeholder="Password" required onChange={x=>setP(x.target.value)} className="w-full mb-6 p-3 border rounded-xl"/><button className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">{i?"Accedi":"Registrati"}</button><p onClick={()=>setI(!i)} className="text-center mt-4 text-sm text-indigo-600 cursor-pointer">{i?"Nuovo? Registrati":"Hai account? Accedi"}</p></form></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
