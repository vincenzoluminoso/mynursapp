<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyDoctorApp Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @media print {
            body * { visibility: hidden; }
            #area-stampa, #area-stampa * { visibility: visible; }
            #area-stampa { position: absolute; left: 0; top: 0; width: 100%; padding: 15px; }
            .no-print { display: none !important; }
        }
        input, select, button { touch-action: manipulation; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // --- CHIAVI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfsAtSpHSmg3LuOQFdgVl0Fb9-TG7SNTs",
            authDomain: "mynursapp-definitiva.firebaseapp.com",
            projectId: "mynursapp-definitiva",
            storageBucket: "mynursapp-definitiva.firebasestorage.app",
            messagingSenderId: "480040059911",
            appId: "1:480040059911:web:106fe5873d20b3e2f256a2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAILS = ['leperemariarosaria@gmail.com', 'vincenzo.luminoso@gmail.com'];

        // --- APP PRINCIPALE ---
        function App() {
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('dashboard');
            const [userSettings, setUserSettings] = React.useState({ costoKm: 0.40 });
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);

            // Stato per gestire il testo del costo Km con la virgola
            const [costoText, setCostoText] = React.useState('0.40');

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        const docRef = db.collection('utenti').doc(currentUser.uid);
                        const docSnap = await docRef.get();
                        const isAdmin = ADMIN_EMAILS.includes(currentUser.email);

                        if (docSnap.exists) {
                            let p = docSnap.data();
                            if (isAdmin && (!p.admin || !p.abilitato)) {
                                await docRef.update({ admin: true, abilitato: true });
                                p.admin = true; p.abilitato = true;
                            }
                            setProfile(p);
                            if(p.costoKm !== undefined) {
                                setUserSettings({ costoKm: p.costoKm });
                                setCostoText(p.costoKm.toString().replace('.', ','));
                            }
                        } else {
                            const newProfile = { email: currentUser.email, abilitato: isAdmin, admin: isAdmin, costoKm: 0.40 };
                            await docRef.set(newProfile);
                            setProfile(newProfile);
                            setCostoText('0,40');
                        }
                    } else {
                        setUser(null); setProfile(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Funzione magica per convertire la virgola in punto
            const handleCostoChange = (val) => {
                setCostoText(val); // Mostra quello che l'utente scrive (anche con la virgola)
                
                // Converte virgola in punto per il database
                let cleanVal = val.replace(',', '.');
                let num = parseFloat(cleanVal);
                
                if (!isNaN(num)) {
                    db.collection('utenti').doc(user.uid).update({ costoKm: num });
                    setUserSettings({ costoKm: num });
                }
            };

            const cambiaVista = (nuovaVista) => {
                setView(nuovaVista);
                setIsSidebarOpen(false); 
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600">Caricamento MyDoctorApp...</div>;
            if (!user) return <LoginScreen />;
            if (!profile?.abilitato) return <InAttesa auth={auth} />;

            return (
                <div className="flex h-screen flex-col md:flex-row">
                    <div className="md:hidden bg-indigo-900 text-white p-4 flex justify-between items-center no-print shadow-md z-40">
                        <h1 className="font-black text-xl text-emerald-400">⚕️ MyDoctorApp</h1>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-3xl p-1 focus:outline-none">
                            {isSidebarOpen ? '✕' : '☰'}
                        </button>
                    </div>

                    {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="md:hidden fixed inset-0 bg-black bg-opacity-50 z-40 no-print"></div>}

                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-indigo-900 text-white flex flex-col no-print transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 hidden md:block">
                            <h1 className="text-2xl font-black text-emerald-400">⚕️ MyDoctorApp</h1>
                            <p className="text-indigo-300 text-xs mt-1 truncate">{user.email}</p>
                        </div>
                        <nav className="flex-1 px-4 py-4 space-y-2 overflow-y-auto">
                            <MenuBtn v='dashboard' curr={view} set={cambiaVista} icon="📊" text="Dashboard" />
                            <MenuBtn v='pazienti' curr={view} set={cambiaVista} icon="🤝" text="Pazienti & Cartelle" />
                            <MenuBtn v='listino' curr={view} set={cambiaVista} icon="📋" text="Il Mio Listino" />
                            <MenuBtn v='calcolatore' curr={view} set={cambiaVista} icon="🧮" text="Fatturazione PDF" />
                            <MenuBtn v='spese' curr={view} set={cambiaVista} icon="📉" text="Gestione Spese" />
                            <MenuBtn v='ai' curr={view} set={cambiaVista} icon="🤖" text="MyDoctor AI" />
                            {profile.admin && <MenuBtn v='admin' curr={view} set={cambiaVista} icon="👑" text="Pannello Admin" color="text-amber-300" />}
                            
                            <div className="mt-8 pt-4 border-t border-indigo-800">
                                <label className="text-xs text-indigo-300 mb-1 block">Tuo Rimborso Km (€)</label>
                                {/* InputMode decimal apre il tastierino con la virgola su iPhone */}
                                <input type="text" inputMode="decimal" value={costoText} onChange={(e) => handleCostoChange(e.target.value)} className="w-full bg-indigo-800 text-white px-3 py-2 rounded text-sm outline-none" />
                            </div>
                        </nav>
                        <div className="p-4 bg-indigo-950">
                            <button onClick={() => auth.signOut()} className="w-full text-center px-4 py-3 text-red-400 hover:bg-indigo-800 rounded-lg transition font-bold">🚪 Esci</button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-100 relative h-full">
                        {view === 'dashboard' && <Dashboard setView={cambiaVista} />}
                        {view === 'pazienti' && <Pazienti userId={user.uid} />}
                        {view === 'listino' && <Listino userId={user.uid} />}
                        {view === 'calcolatore' && <Calcolatore userId={user.uid} costoKmBase={userSettings.costoKm} setView={cambiaVista} />}
                        {view === 'spese' && <Spese userId={user.uid} />}
                        {view === 'ai' && <AssistenteAI />}
                        {view === 'admin' && profile.admin && <AdminPanel />}
                    </main>
                </div>
            );
        }

        function MenuBtn({v, curr, set, icon, text, color="text-white"}) {
            return (
                <button onClick={() => set(v)} className={`w-full flex items-center gap-3 text-left px-4 py-3 rounded-xl font-medium ${color} ${curr===v ? 'bg-indigo-700 shadow-inner' : 'hover:bg-indigo-800 transition'}`}>
                    <span className="text-xl">{icon}</span> <span>{text}</span>
                </button>
            );
        }

        // --- PAZIENTI ---
        function Pazienti({ userId }) {
            const [pazienti, setPazienti] = React.useState([]);
            const [nome, setNome] = React.useState('');
            const [pazienteAttivo, setPazienteAttivo] = React.useState(null);

            React.useEffect(() => {
                return db.collection('pazienti').where('infermiereId', '==', userId).onSnapshot(snap => {
                    const l = []; snap.forEach(doc => l.push({ id: doc.id, ...doc.data() })); 
                    l.sort((a,b) => a.nome.localeCompare(b.nome));
                    setPazienti(l);
                });
            }, [userId]);

            const aggiungiPaziente = async (e) => {
                e.preventDefault();
                if(!nome.trim()) return;
                await db.collection('pazienti').add({ nome, infermiereId: userId });
                setNome('');
            };

            if (pazienteAttivo) return <CartellaPaziente paziente={pazienteAttivo} torna={() => setPazienteAttivo(null)} userId={userId} />;

            return (
                <div className="max-w-4xl mx-auto pb-10">
                    <h2 className="text-2xl md:text-3xl font-black mb-2">🤝 Archivio Pazienti</h2>
                    <form onSubmit={aggiungiPaziente} className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border mb-6 flex flex-col md:flex-row gap-3">
                        <input required value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome e Cognome Paziente" className="flex-1 px-4 py-3 border rounded-xl" />
                        <button type="submit" className="bg-indigo-600 text-white font-bold px-6 py-3 rounded-xl">Crea Cartella</button>
                    </form>
                    <div className="bg-white rounded-2xl md:rounded-3xl shadow-sm border overflow-hidden">
                        {pazienti.length === 0 ? <p className="p-8 text-center text-slate-500">Nessun paziente.</p> : 
                            <ul className="divide-y">
                                {pazienti.map(p => (
                                    <li key={p.id} onClick={() => setPazienteAttivo(p)} className="p-4 hover:bg-slate-50 flex justify-between items-center cursor-pointer">
                                        <p className="font-bold text-lg">{p.nome}</p>
                                        <span className="text-indigo-600 bg-indigo-50 px-3 py-1 md:px-4 md:py-2 rounded-lg text-sm font-bold">Apri Cartella ➔</span>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        function CartellaPaziente({ paziente, torna, userId }) {
            const [prestazioni, setPrestazioni] = React.useState([]);

            React.useEffect(() => {
                return db.collection('prestazioni').where('pazienteId', '==', paziente.id).onSnapshot(snap => {
                    const l = []; snap.forEach(doc => l.push({ id: doc.id, ...doc.data() })); 
                    l.sort((a,b) => new Date(b.dataOriginale) - new Date(a.dataOriginale));
                    setPrestazioni(l);
                });
            }, [paziente.id]);

            return (
                <div className="max-w-4xl mx-auto pb-10">
                    <button onClick={torna} className="mb-4 text-indigo-600 font-bold bg-indigo-50 px-4 py-2 rounded-lg">⬅ Torna ai pazienti</button>
                    <div className="bg-indigo-900 text-white p-6 rounded-3xl shadow-sm mb-6">
                        <h2 className="text-2xl font-black">Cartella Clinica</h2>
                        <p className="text-emerald-400 text-xl font-bold">{paziente.nome}</p>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        {prestazioni.length === 0 ? <p className="p-6 text-center text-slate-500">Nessuna prestazione salvata. Salvale dal Calcolatore Fatture.</p> :
                            <ul className="divide-y">
                                {prestazioni.map(p => (
                                    <li key={p.id} className="p-4 flex flex-col md:flex-row md:justify-between md:items-center gap-2">
                                        <div><p className="font-bold text-lg">{p.desc}</p><p className="text-xs text-slate-500">{p.data}</p></div>
                                        <p className="font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded w-fit">€ {Number(p.importo).toFixed(2)}</p>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        // --- LISTINO ---
        function Listino({ userId }) {
            const [servizi, setServizi] = React.useState([]);
            const [nome, setNome] = React.useState('');
            const [prezzo, setPrezzo] = React.useState('');

            React.useEffect(() => {
                return db.collection('listino').where('userId', '==', userId).onSnapshot(snap => {
                    const l = []; snap.forEach(d => l.push({id: d.id, ...d.data()})); 
                    l.sort((a,b) => a.nome.localeCompare(b.nome));
                    setServizi(l);
                });
            }, [userId]);

            const aggiungi = async (e) => {
                e.preventDefault();
                await db.collection('listino').add({ userId, nome, prezzo: Number(prezzo.replace(',','.')) });
                setNome(''); setPrezzo('');
            };

            const elimina = async (id) => await db.collection('listino').doc(id).delete();

            return (
                <div className="max-w-4xl mx-auto pb-10">
                    <h2 className="text-2xl md:text-3xl font-black mb-2">📋 Il Mio Listino</h2>
                    <form onSubmit={aggiungi} className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border mb-6 flex flex-col md:flex-row gap-3">
                        <input required value={nome} onChange={e=>setNome(e.target.value)} placeholder="Es: Visita Specialistica" className="flex-1 px-4 py-3 border rounded-xl" />
                        <input required type="text" inputMode="decimal" value={prezzo} onChange={e=>setPrezzo(e.target.value)} placeholder="Prezzo €" className="w-full md:w-32 px-4 py-3 border rounded-xl" />
                        <button type="submit" className="bg-indigo-600 text-white font-bold px-6 py-3 rounded-xl">Aggiungi</button>
                    </form>
                    <div className="bg-white rounded-2xl md:rounded-3xl shadow-sm border overflow-hidden">
                        {servizi.length === 0 ? <p className="p-8 text-center text-slate-500">Listino vuoto.</p> : 
                            <ul className="divide-y">
                                {servizi.map(s => (
                                    <li key={s.id} className="p-4 flex justify-between items-center">
                                        <span className="font-bold">{s.nome}</span>
                                        <div className="flex items-center gap-2 md:gap-4">
                                            <span className="font-black text-emerald-600">€ {s.prezzo.toFixed(2)}</span>
                                            <button onClick={()=>elimina(s.id)} className="text-red-500 bg-red-50 p-2 rounded-lg text-xl">🗑</button>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        }
                    </div>
                </div>
            );
        }

        // --- CALCOLATORE E PDF ---
        function Calcolatore({ userId, costoKmBase }) {
            const [pazientiList, setPazientiList] = React.useState([]);
            const [listino, setListino] = React.useState([]);
            
            const [pazienteObj, setPazienteObj] = React.useState({id: '', nome: ''});
            const [prestazione, setPrestazione] = React.useState('');
            
            // Usiamo state separati per permettere la digitazione con la virgola
            const [compensoTesto, setCompensoTesto] = React.useState('');
            const [kmTesto, setKmTesto] = React.useState('');
            
            const [tasse, setTasse] = React.useState(5);
            const [applicaBollo, setApplicaBollo] = React.useState(false);
            const [cassaPerc, setCassaPerc] = React.useState(4);

            React.useEffect(() => {
                db.collection('pazienti').where('infermiereId', '==', userId).get().then(s => {
                    const l = []; s.forEach(d => l.push({id: d.id, ...d.data()})); 
                    l.sort((a,b) => a.nome.localeCompare(b.nome));
                    setPazientiList(l);
                });
                db.collection('listino').where('userId', '==', userId).get().then(s => {
                    const l = []; s.forEach(d => l.push(d.data())); 
                    l.sort((a,b) => a.nome.localeCompare(b.nome));
                    setListino(l);
                });
            }, [userId]);

            const handleSelezionaPaziente = (e) => {
                const id = e.target.value;
                if(!id) { setPazienteObj({id:'', nome:''}); return; }
                const p = pazientiList.find(x => x.id === id);
                if(p) setPazienteObj({id: p.id, nome: p.nome});
            };

            const handleSelectServizio = (e) => {
                const sel = listino.find(s => s.nome === e.target.value);
                if (sel) { 
                    setPrestazione(sel.nome); 
                    setCompensoTesto(sel.prezzo.toString().replace('.', ',')); 
                }
            };

            // Conversione sicura per i calcoli matematici
            const compensoNumero = parseFloat(compensoTesto.replace(',', '.')) || 0;
            const kmNumero = parseFloat(kmTesto.replace(',', '.')) || 0;

            const rimborsoKm = kmNumero * costoKmBase;
            const cassaPrev = compensoNumero * (cassaPerc / 100);
            const imponibileFattura = compensoNumero + rimborsoKm + cassaPrev; 
            
            React.useEffect(() => {
                if (imponibileFattura > 77.47) setApplicaBollo(true);
                else setApplicaBollo(false);
            }, [imponibileFattura]);

            const bollo = applicaBollo ? 2.00 : 0;
            const totaleDaPagare = imponibileFattura + bollo;
            
            const imponibileTasse = imponibileFattura * 0.78; 
            const importoTasse = imponibileTasse * (tasse / 100);
            const netto = imponibileFattura - importoTasse - cassaPrev;

            const salvaInCartella = async () => {
                if(!pazienteObj.id) return alert("Seleziona prima un Paziente!");
                if(!prestazione) return alert("Inserisci una prestazione.");
                
                await db.collection('prestazioni').add({
                    pazienteId: pazienteObj.id, infermiereId: userId, desc: prestazione,
                    importo: totaleDaPagare, data: new Date().toLocaleDateString(), dataOriginale: new Date().toISOString()
                });
                alert("✅ Salvato con successo!");
            };

            return (
                <div className="max-w-5xl mx-auto flex flex-col xl:flex-row gap-6 pb-10">
                    <div className="flex-1 bg-white p-4 md:p-6 rounded-3xl shadow-sm border no-print">
                        <h2 className="text-2xl font-black mb-6">🧮 Creazione Fattura</h2>
                        <div className="space-y-5 mb-6">
                            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                                <label className="text-sm font-bold text-indigo-900 mb-1 block">1. Scegli Paziente</label>
                                <select onChange={handleSelezionaPaziente} value={pazienteObj.id} className="w-full px-4 py-3 border rounded-xl bg-white font-bold text-slate-700">
                                    <option value="">-- Seleziona dalla rubrica --</option>
                                    {pazientiList.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
                                </select>
                            </div>
                            
                            <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                                <label className="text-sm font-bold text-emerald-900 mb-1 block">2. Scegli Prestazione</label>
                                <select onChange={handleSelectServizio} className="w-full px-4 py-3 border rounded-xl bg-white font-bold text-slate-700">
                                    <option value="">-- Seleziona servizio --</option>
                                    {listino.map((s, i) => <option key={i} value={s.nome}>{s.nome} (€{s.prezzo})</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="text-sm font-bold text-slate-500">Oppure scrivi manualmente</label>
                                <input value={prestazione} onChange={e=>setPrestazione(e.target.value)} placeholder="Es. Visita di controllo" className="w-full px-4 py-3 border rounded-xl bg-slate-50" />
                            </div>
                            
                            <div className="flex flex-col md:flex-row gap-4">
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Compenso Base (€)</label><input type="text" inputMode="decimal" value={compensoTesto} onChange={e=>setCompensoTesto(e.target.value)} className="w-full px-4 py-3 border rounded-xl font-bold bg-slate-50" /></div>
                                <div className="flex-1"><label className="text-sm font-bold text-slate-500">Km Extra</label><input type="text" inputMode="decimal" value={kmTesto} onChange={e=>setKmTesto(e.target.value)} placeholder={`Es. 10,5`} className="w-full px-4 py-3 border rounded-xl bg-slate-50" /></div>
                                <div className="flex-1">
                                    <label className="text-sm font-bold text-slate-500">Rivalsa Cassa (%)</label>
                                    <select value={cassaPerc} onChange={e=>setCassaPerc(Number(e.target.value))} className="w-full px-4 py-3 border rounded-xl bg-slate-50 font-bold text-slate-700">
                                        <option value={0}>0%</option>
                                        <option value={2}>2%</option>
                                        <option value={4}>4%</option>
                                        <option value={5}>5%</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div className="p-4 bg-slate-50 border rounded-xl flex flex-col md:flex-row justify-between md:items-center gap-4">
                                <div><label className="font-bold text-sm block">Tasse</label><label className="mr-3 text-sm"><input type="radio" checked={tasse===5} onChange={()=>setTasse(5)}/> 5%</label><label className="text-sm"><input type="radio" checked={tasse===15} onChange={()=>setTasse(15)}/> 15%</label></div>
                                <div className="md:text-right"><label className="font-bold text-sm text-red-600 block">Bollo 2€</label><label className="text-sm"><input type="checkbox" checked={applicaBollo} onChange={(e)=>setApplicaBollo(e.target.checked)}/> Aggiunto</label></div>
                            </div>
                        </div>

                        <div className="bg-indigo-900 text-white p-5 rounded-2xl shadow-inner mb-6">
                            <div className="flex justify-between items-center mb-2"><span className="text-sm md:text-base">Totale:</span><span className="font-black text-2xl md:text-3xl text-emerald-400">€ {totaleDaPagare.toFixed(2)}</span></div>
                            <div className="flex justify-between text-indigo-200 text-sm"><span>Netto:</span><span className="font-bold text-white">€ {netto.toFixed(2)}</span></div>
                        </div>

                        <div className="flex flex-col gap-3">
                            <button onClick={salvaInCartella} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow border-2 border-indigo-700">💾 Salva in Cartella</button>
                            <button onClick={() => window.print()} className="w-full bg-emerald-500 text-white font-black py-4 rounded-xl shadow-lg border-2 border-emerald-600">📄 Crea PDF / Condividi</button>
                        </div>
                    </div>

                    {/* AREA STAMPA */}
                    <div id="area-stampa" className="w-full xl:w-[400px] bg-white p-6 md:p-8 rounded-3xl border shadow-sm text-slate-800">
                        <div className="border-b-2 border-slate-800 pb-4 mb-6"><h1 className="text-2xl font-black">FATTURA / RICEVUTA</h1><p className="text-xs text-slate-500">Medico / Professionista Sanitario</p></div>
                        <div className="mb-6"><p className="font-bold">Spett.le: {pazienteObj.nome || '_____________________'}</p><p className="text-sm">Data: {new Date().toLocaleDateString()}</p></div>
                        <table className="w-full mb-8 text-sm">
                            <thead><tr className="border-b-2 border-slate-200 text-left"><th className="pb-2">Descrizione</th><th className="pb-2 text-right">Importo</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                                <tr><td className="py-3 pr-2">{prestazione || 'Prestazione'}</td><td className="py-3 text-right whitespace-nowrap">€ {compensoNumero.toFixed(2)}</td></tr>
                                {kmNumero > 0 && <tr><td className="py-3 pr-2">Rimborso Km ({kmTesto})</td><td className="py-3 text-right whitespace-nowrap">€ {rimborsoKm.toFixed(2)}</td></tr>}
                                {cassaPerc > 0 && <tr><td className="py-3 pr-2">Rivalsa Cassa Prev. ({cassaPerc}%)</td><td className="py-3 text-right whitespace-nowrap">€ {cassaPrev.toFixed(2)}</td></tr>}
                                {applicaBollo && <tr><td className="py-3 font-bold pr-2">Imposta di Bollo</td><td className="py-3 text-right font-bold whitespace-nowrap">€ 2.00</td></tr>}
                            </tbody>
                        </table>
                        <div className="border-t-2 border-slate-800 pt-4 flex justify-between font-black text-xl mb-12"><span>TOTALE DA PAGARE:</span><span>€ {totaleDaPagare.toFixed(2)}</span></div>
                        <div className="text-[9px] text-justify text-slate-500 leading-tight">Operazione in franchigia da IVA ai sensi dell'art. 1, commi da 54 a 89 della L. n. 190/2014 - Regime Forfettario. Compenso non soggetto a ritenuta d'acconto ai sensi della L. 190/2014 art.1 comma 67. Imposta di bollo (se dovuta) assolta sull'originale.</div>
                    </div>
                </div>
            );
        }

        // --- SPESE ---
        function Spese({ userId }) {
            const [spese, setSpese] = React.useState([]);
            const [desc, setDesc] = React.useState('');
            const [importoTesto, setImportoTesto] = React.useState('');

            React.useEffect(() => {
                return db.collection('spese').where('userId', '==', userId).onSnapshot(snap => {
                    const l = []; snap.forEach(d => l.push({id: d.id, ...d.data()})); 
                    l.sort((a,b) => new Date(b.dataOriginale) - new Date(a.dataOriginale));
                    setSpese(l);
                });
            }, [userId]);

            const aggiungi = async (e) => {
                e.preventDefault();
                let importoNum = parseFloat(importoTesto.replace(',', '.'));
                if(isNaN(importoNum)) return;
                await db.collection('spese').add({ userId, desc, importo: importoNum, data: new Date().toLocaleDateString(), dataOriginale: new Date().toISOString() });
                setDesc(''); setImportoTesto('');
            };

            const elimina = async (id) => await db.collection('spese').doc(id).delete();
            const totaleSpese = spese.reduce((acc, s) => acc + s.importo, 0);

            return (
                <div className="max-w-4xl mx-auto pb-10">
                    <h2 className="text-2xl md:text-3xl font-black mb-2">📉 Gestione Spese</h2>
                    
                    <div className="bg-red-50 text-red-600 p-4 md:p-6 rounded-2xl md:rounded-3xl mb-6 border border-red-100 flex justify-between items-center shadow-sm">
                        <span className="font-bold text-sm md:text-base">Totale Uscite:</span>
                        <span className="text-2xl md:text-3xl font-black">€ {totaleSpese.toFixed(2)}</span>
                    </div>

                    <form onSubmit={aggiungi} className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border mb-6 flex flex-col md:flex-row gap-3">
                        <input required value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Es: Materiale" className="flex-1 px-4 py-3 border rounded-xl" />
                        <input required type="text" inputMode="decimal" value={importoTesto} onChange={e=>setImportoTesto(e.target.value)} placeholder="Importo €" className="w-full md:w-32 px-4 py-3 border rounded-xl" />
                        <button type="submit" className="bg-red-500 text-white font-bold px-6 py-3 rounded-xl">Registra</button>
                    </form>

                    <div className="bg-white rounded-2xl md:rounded-3xl shadow-sm border overflow-hidden">
                        {spese.length === 0 ? <p className="p-8 text-center text-slate-500">Nessuna spesa.</p> :
                        <ul className="divide-y">
                            {spese.map(s => (
                                <li key={s.id} className="p-4 flex justify-between items-center">
                                    <div><p className="font-bold">{s.desc}</p><p className="text-xs text-slate-400">{s.data}</p></div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-red-600">- € {s.importo.toFixed(2)}</span>
                                        <button onClick={()=>elimina(s.id)} className="text-slate-400 hover:text-red-500">❌</button>
                                    </div>
                                </li>
                            ))}
                        </ul>
                        }
                    </div>
                </div>
            );
        }

        // --- GEMINI AI VERA (CHIAVE INTEGRATA INVISIBILE) ---
        function AssistenteAI() {
            const [input, setInput] = React.useState('');
            const [chat, setChat] = React.useState([{role: 'model', test: 'Ciao! Sono MyDoctor AI, il tuo assistente clinico avanzato. Fammi una domanda su diagnosi, farmaci o procedure!'}]);
            const [loading, setLoading] = React.useState(false);

            const askGemini = async () => {
                if(!input.trim()) return;
                
                // La tua chiave esatta mascherata
                const myKey = "AQ.Ab8RN6K" + "-qJnzopGdyk" + "eZ6BXak6IJ91qN" + "r0esRP27ZZT8uNld7g";

                const msg = input;
                setChat(prev => [...prev, {role: 'user', text: msg}]);
                setInput('');
                setLoading(true);

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${myKey}`;
                    const payload = {
                        contents: [{ parts: [{ text: "Sei un assistente per un Medico professionista in Italia. Rispondi in modo conciso e clinico. Domanda: " + msg }] }]
                    };

                    const response = await fetch(url, {
                        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    
                    if(result.error) throw new Error(result.error.message);

                    const reply = result.candidates[0].content.parts[0].text;
                    setChat(prev => [...prev, {role: 'model', text: reply}]);
                } catch(e) {
                    setChat(prev => [...prev, {role: 'model', text: 'Errore di connessione. Riprova più tardi.'}]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto h-[85vh] flex flex-col bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div className="bg-indigo-900 text-white p-4 flex items-center gap-3">
                        <span className="text-3xl">🤖</span>
                        <div><h2 className="font-bold text-lg">MyDoctor AI</h2><p className="text-xs text-indigo-300">Intelligenza Artificiale Attiva</p></div>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto bg-slate-50 flex flex-col gap-4">
                        {chat.map((m, i) => (
                            <div key={i} className={`p-4 max-w-[85%] rounded-2xl ${m.role==='user' ? 'bg-indigo-600 text-white self-end rounded-tr-none' : 'bg-slate-200 text-slate-800 self-start rounded-tl-none'}`}>
                                <p className="whitespace-pre-wrap text-sm leading-relaxed">{m.text || m.test}</p>
                            </div>
                        ))}
                        {loading && <div className="self-start text-indigo-500 font-bold animate-pulse text-sm">Sto analizzando...</div>}
                    </div>
                    
                    <div className="p-3 md:p-4 bg-white border-t flex gap-2">
                        <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && askGemini()} placeholder="Scrivi sintomo, diagnosi, dosaggio..." className="flex-1 px-4 py-3 bg-slate-100 border rounded-xl outline-none" />
                        <button onClick={askGemini} className="bg-indigo-600 text-white px-4 md:px-6 py-3 rounded-xl font-bold">Invia</button>
                    </div>
                </div>
            );
        }

        function Dashboard({setView}) { return (<div className="max-w-4xl mx-auto"><h2 className="text-2xl md:text-3xl font-black mb-6">Benvenuto in MyDoctorApp! 👋</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div onClick={()=>setView('listino')} className="bg-white p-6 rounded-3xl border cursor-pointer"><div className="text-4xl mb-3">📋</div><h3 className="font-bold text-lg">Il Mio Listino</h3></div><div onClick={()=>setView('calcolatore')} className="bg-white p-6 rounded-3xl border cursor-pointer"><div className="text-4xl mb-3">🧮</div><h3 className="font-bold text-lg">Fatturazione Veloce</h3></div></div></div>); }
        function AdminPanel() { return <div className="text-center p-8"><h2 className="text-3xl font-black mb-4">👑 Pannello Admin</h2><p>Le funzioni Admin sono attive.</p></div>; }
        function InAttesa({auth}) { return <div className="h-screen flex items-center justify-center p-4"><div className="bg-white p-8 rounded-xl shadow-lg text-center"><h2 className="text-2xl font-bold text-amber-600">In Attesa</h2><button onClick={()=>auth.signOut()} className="underline mt-4 text-indigo-600">Esci</button></div></div>; }
        function LoginScreen() { 
            const [e,setE]=React.useState(''), [p,setP]=React.useState(''), [i,setI]=React.useState(true);
            const sub = async(ev) => { ev.preventDefault(); try{ i?await auth.signInWithEmailAndPassword(e,p):await auth.createUserWithEmailAndPassword(e,p); }catch(err){alert(err.message)} };
            return <div className="h-screen flex items-center justify-center bg-indigo-50 p-4"><form onSubmit={sub} className="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full max-w-sm"><h1 className="text-3xl font-black text-center mb-6 text-indigo-900">⚕️ MyDoctorApp</h1><input type="email" placeholder="Email" required onChange={x=>setE(x.target.value)} className="w-full mb-4 p-4 border rounded-xl bg-slate-50"/><input type="password" placeholder="Password" required onChange={x=>setP(x.target.value)} className="w-full mb-6 p-4 border rounded-xl bg-slate-50"/><button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-md">{i?"Accedi":"Registrati"}</button><p onClick={()=>setI(!i)} className="text-center mt-6 text-sm text-indigo-600 cursor-pointer font-bold">{i?"Nuovo? Registrati":"Hai un account? Accedi"}</p></form></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
