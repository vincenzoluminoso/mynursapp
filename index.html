<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyNursApp Pro - Gestionale</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, collection } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    
    // Le tue chiavi esatte e funzionanti!
    const firebaseConfig = {
      apiKey: "AIzaSyCMCoT0DAq6KFgUHbMBJpJwvsom21WUuuA",
      authDomain: "mynursapp-pro.firebaseapp.com",
      projectId: "mynursapp-pro",
      storageBucket: "mynursapp-pro.firebasestorage.app",
      messagingSenderId: "39197762286",
      appId: "1:39197762286:web:cf4707f13988b582a909ff"
    };
    
    const app = initializeApp(firebaseConfig);
    window.fAuth = { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut };
    window.fDb = { getFirestore, doc, getDoc, setDoc };
    window.fApp = app;
  </script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const [isLogin, setIsLogin] = useState(true); // True = Accedi, False = Registrati
      const [errorMsg, setErrorMsg] = useState(''); // Il nostro rivelatore di errori

      useEffect(() => {
        // Aspettiamo 1 secondo che Firebase si carichi dal modulo
        setTimeout(() => {
          if(!window.fAuth) {
             setErrorMsg("Errore: Firebase non è riuscito a caricarsi. Controlla la tua connessione internet.");
             return;
          }
          const auth = window.fAuth.getAuth(window.fApp);
          const db = window.fDb.getFirestore(window.fApp);

          window.fAuth.onAuthStateChanged(auth, async (u) => {
            if (u) {
              try {
                const userDocRef = window.fDb.doc(db, 'utenti', u.uid);
                const userDoc = await window.fDb.getDoc(userDocRef);
                if (userDoc.exists()) {
                  setProfile(userDoc.data());
                  setUser(u);
                } else {
                  // Primo accesso in assoluto, creiamo il profilo bloccato
                  const p = { email: u.email, abilitato: false, admin: false };
                  await window.fDb.setDoc(userDocRef, p);
                  setProfile(p);
                  setUser(u);
                }
              } catch (err) {
                setErrorMsg("Errore Database: " + err.message + ". Prova a ricaricare la pagina.");
              }
            } else {
              setUser(null);
            }
          });
        }, 1000);
      }, []);

      const handleAuth = async () => {
        setErrorMsg(''); // Pulisco gli errori vecchi
        const auth = window.fAuth.getAuth(window.fApp);
        
        try {
          if (isLogin) {
            await window.fAuth.signInWithEmailAndPassword(auth, email, pass);
          } else {
            await window.fAuth.createUserWithEmailAndPassword(auth, email, pass);
          }
        } catch (e) {
          console.error(e);
          // TRADUCIAMO GLI ERRORI IN ITALIANO PER CAPIRE IL PROBLEMA!
          if (e.code === 'auth/email-already-in-use') {
            setErrorMsg("❌ Questa email è già registrata! Clicca sulla scritta blu in basso 'Hai già un account? Accedi' per fare il Login.");
          } else if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') {
            setErrorMsg("❌ Password sbagliata o account inesistente.");
          } else if (e.code === 'auth/weak-password') {
            setErrorMsg("❌ La password è troppo debole, deve avere almeno 6 caratteri.");
          } else {
            setErrorMsg("❌ Errore tecnico: " + e.message);
          }
        }
      };

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
            <h1 className="text-2xl font-bold mb-2 text-center text-indigo-900">MyNursApp Pro</h1>
            <p className="text-center text-gray-500 mb-6 font-medium">{isLogin ? "Bentornato, fai l'accesso" : "Crea un nuovo account"}</p>
            
            {/* BOX DEGLI ERRORI IN ROSSO */}
            {errorMsg && (
              <div className="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm font-bold shadow-sm">
                {errorMsg}
              </div>
            )}

            <input className="w-full border p-3 mb-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Email" onChange={e => setEmail(e.target.value)} />
            <input className="w-full border p-3 mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" type="password" placeholder="Password" onChange={e => setPass(e.target.value)} />
            
            <button onClick={handleAuth} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition">
              {isLogin ? "ACCEDI" : "REGISTRATI"}
            </button>
            
            <button 
              onClick={() => { setIsLogin(!isLogin); setErrorMsg(''); }} 
              className="mt-6 w-full text-center text-sm font-bold text-indigo-600 hover:underline">
              {isLogin ? "Non hai un account? Registrati qui" : "Hai già un account? Accedi qui"}
            </button>
          </div>
        </div>
      );

      if (!profile?.abilitato && !profile?.admin) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
           <div className="bg-white p-8 rounded-2xl shadow-lg max-w-md">
              <h2 className="text-2xl font-bold text-amber-600 mb-4">Account in Revisione</h2>
              <p className="text-gray-700 mb-6">Il tuo account è stato creato con successo! Sei in attesa di approvazione dall'amministratore.</p>
              <button onClick={() => window.fAuth.signOut(window.fAuth.getAuth(window.fApp))} className="text-red-500 font-bold underline">Esci</button>
           </div>
        </div>
      );

      return (
        <div className="p-4 max-w-4xl mx-auto mt-6">
          <div className="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex justify-between items-center mb-6">
            <div>
               <h1 className="text-2xl font-black text-indigo-900">Dashboard</h1>
               <p className="text-sm text-gray-500">{user.email}</p>
            </div>
            <button onClick={() => window.fAuth.signOut(window.fAuth.getAuth(window.fApp))} className="text-red-500 font-bold px-4 py-2 hover:bg-red-50 rounded-lg">ESCI</button>
          </div>

          {profile.admin && (
            <div className="bg-amber-100 p-6 rounded-2xl border border-amber-300 mb-6 shadow-sm">
              <h2 className="font-bold text-amber-900 text-lg">👑 PANNELLO AMMINISTRATORE</h2>
              <p className="text-amber-800 text-sm mt-1">Solo tu vedi questo riquadro. Vai su Firebase per abilitare i tuoi clienti.</p>
            </div>
          )}

          <div className="grid md:grid-cols-2 gap-6">
             <div className="bg-indigo-600 text-white p-8 rounded-3xl shadow-xl">
                <h2 className="text-xl font-bold mb-2">Fatturazione Veloce</h2>
                <p className="text-indigo-200 text-sm mb-6">Calcolo forfettario sul 78% di redditività</p>
                <div className="bg-white/10 p-4 rounded-xl">
                   <p className="font-bold text-center">Strumento di calcolo in arrivo...</p>
                </div>
             </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
